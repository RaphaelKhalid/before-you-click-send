<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__DOC_TITLE__</title>
<meta name="description" content="__DOC_DESC__">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;background:#f4f3ee;color:#1a1a1a;font-family:'Courier Prime',ui-monospace,monospace}
  body{background-image:radial-gradient(#e6e4da 1.1px,transparent 1.1px);background-size:24px 24px;background-attachment:fixed}
  a{color:#1a1a1a}a:hover{color:#555}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes drawSpoke{from{stroke-dashoffset:260}to{stroke-dashoffset:0}}
  @keyframes popIn{from{opacity:0;transform:scale(.3) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes stampIn{0%{opacity:0;transform:rotate(-18deg) scale(2.4)}62%{opacity:1;transform:rotate(-11deg) scale(.86)}78%{transform:rotate(-11deg) scale(1.06)}100%{opacity:1;transform:rotate(-11deg) scale(1)}}
  @keyframes sway{0%,100%{transform:rotate(-1.8deg)}50%{transform:rotate(1.8deg)}}
  @keyframes swayHard{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
  @keyframes stroll{from{left:-52px}to{left:100%}}
  @keyframes waddle{0%{transform:translateY(0) rotate(-6deg)}25%{transform:translateY(-3px) rotate(0)}50%{transform:translateY(0) rotate(6deg)}75%{transform:translateY(-3px) rotate(0)}100%{transform:translateY(0) rotate(-6deg)}}
  @keyframes incLine{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes jump{0%,100%{transform:translateY(0)}28%{transform:translateY(-15px)}42%{transform:translateY(-15px)}62%{transform:translateY(0)}}
  @keyframes nod{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(5deg)}}
  @keyframes jitter{0%,100%{transform:translate(0,0)}20%{transform:translate(-1.6px,1px)}40%{transform:translate(1.6px,-1px)}60%{transform:translate(-1.2px,-1px)}80%{transform:translate(1.2px,1px)}}
  @keyframes meterPop{0%{transform:scale(1)}40%{transform:scale(1.9)}100%{transform:scale(1)}}
  @keyframes dotPulse{0%{transform:scale(1)}50%{transform:scale(1.32)}100%{transform:scale(1)}}
  .fig{transform-box:fill-box;transform-origin:50% 100%}
  .blob{cursor:pointer;background:#fff;transition:transform .13s cubic-bezier(.34,1.56,.64,1),box-shadow .13s ease}
  .blob:hover{transform:translateY(-3px) rotate(-.8deg);box-shadow:4px 5px 0 #1a1a1a}
  .blob:active{transform:translateY(1px);box-shadow:1px 1px 0 #1a1a1a}
  .blob2{cursor:pointer;transition:transform .13s ease}
  .blob2:hover{transform:translateY(-2px)}
  .opt{cursor:pointer;transition:transform .14s cubic-bezier(.34,1.56,.64,1),box-shadow .14s ease;animation:fadeUp .4s ease both}
  .opt:hover{box-shadow:3px 4px 0 #1a1a1a}
  .lnk{cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  .lnk:hover{color:#1a1a1a}
  .confpop{animation:meterPop .45s ease}
  .printonly{display:none}
  @media print{[data-noprint]{display:none!important}.printonly{display:block!important}html,body{background:#fff;background-image:none}}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <filter id="rough" x="-40%" y="-40%" width="180%" height="180%">
    <feTurbulence type="fractalNoise" baseFrequency="0.009 0.011" numOctaves="3" seed="11" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="14"/>
  </filter>
  <filter id="rough2" x="-40%" y="-40%" width="180%" height="180%">
    <feTurbulence type="fractalNoise" baseFrequency="0.013 0.008" numOctaves="3" seed="29" result="m"/>
    <feDisplacementMap in="SourceGraphic" in2="m" scale="12"/>
  </filter>
</defs></svg>

<div id="app" style="max-width:720px;margin:0 auto;padding:22px 18px 80px;min-height:100vh"></div>

<script>
"use strict";

/*__DATASET__*/

const PEOPLE = DATASET.people;
const HABITS = DATASET.habits;
const SOURCES = DATASET.sources;
const DAY_META = DATASET.dayMeta;
const DAYS = DATASET.days;
const SCN = DATASET.scene;
const RED='#c0392b', GREEN='#2f7d32', GREY='#b7b5ac';
const RADII = ['255px 15px 225px 15px/15px 225px 15px 255px','15px 255px 15px 225px/225px 15px 255px 15px','225px 18px 255px 20px/20px 255px 18px 225px'];
const ROT = ['-.5','.5','-.7'];
const BLOB_RADIUS = '255px 15px 225px 15px/15px 225px 15px 255px';

// ---- state ----
const state = { screen:'landing', day:0, choices:Array(10).fill(null), confidence:0.06, emailCount:0, emailTarget:340, name:'', orders:[], lastFilled:1 };
let emailTimer = null;

function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

const start = () => { state.screen='day'; state.day=0; state.choices=Array(10).fill(null); state.confidence=0.06; state.lastFilled=Math.round(0.06*22); state.orders=DAYS.map(()=>shuffle([0,1,2])); render(); };
function choose(dayIdx, optIdx){
  const opt=DAYS[dayIdx].opts[optIdx];
  state.choices[dayIdx]={ safe:opt.safe, short:opt.short, cap:opt.cap, note:opt.note };
  state.lastFilled=Math.round(state.confidence*22);
  state.confidence=Math.min(1, state.confidence + opt.bump);
  const target=opt.emailTarget||1;
  state.emailTarget=target;
  state.screen='consequence';
  render();
  if(dayIdx===2) startEmails(target);
}
function startEmails(target){
  state.emailCount=0; clearInterval(emailTimer);
  const step=Math.max(1, Math.round(target/42));
  emailTimer=setInterval(()=>{
    const n=Math.min(target, state.emailCount+step);
    state.emailCount=n;
    if(n>=target) clearInterval(emailTimer);
    render();
  },24);
}
const continueDay = () => { const d=state.day; if(d>=9){ state.screen='friday'; } else { state.screen='day'; state.day=d+1; } render(); };
const gotoEnd = () => { const u=state.choices.filter(c=>c&&!c.safe).length; state.screen = u>=3 ? 'incident' : 'cert'; render(); };
const restart = () => { clearInterval(emailTimer); state.screen='landing'; state.day=0; state.choices=Array(10).fill(null); state.confidence=0.06; state.emailCount=0; render(); };

// ---- computed values ----
function computeVals(){
  const s=state, d=s.day, cc=s.choices[d];
  const meta=DAY_META[d]||{}, dd=DAYS[d]||{opts:[]};
  const bad=cc&&!cc.safe, good=cc&&cc.safe;
  const badCol=bad?RED:(good?GREEN:'#1a1a1a');

  let activeIdx=-1;
  if(s.screen==='day'||s.screen==='consequence') activeIdx=d;
  else if(['friday','incident','cert'].includes(s.screen)) activeIdx=10;
  const dots=Array.from({length:10},(_,i)=>({ fill:i<activeIdx?'#1a1a1a':(i===activeIdx?'#c0392b':'#fff'), active:i===activeIdx }));

  const filled=Math.round(s.confidence*22);
  const confBlocks=Array.from({length:22},(_,i)=>({fill:i<filled?'#1a1a1a':'#fff', fresh:(i>=s.lastFilled&&i<filled)}));

  const order=s.orders[d]||[0,1,2];
  const dayOptions=order.map((origIdx,i)=>{ const o=dd.opts[origIdx]; return { text:o.text, letter:String.fromCharCode(65+i), radius:RADII[i%3], rot:ROT[i%3], origIdx, day:d, i }; });

  const outRows=PEOPLE.map((p,i)=>({ name: bad ? p.name : (DATASET.echo.anonPrefix)+String.fromCharCode(65+i), val:p.val, delay:(0.15*i).toFixed(2) }));
  const shownCount=Math.min(150, Math.max(1, Math.round(s.emailCount/(s.emailTarget>340?4.6:2.6))));
  const envelopes=Array.from({length:shownCount},(_,i)=>({delay:(i*0.01).toFixed(3)}));

  const spokes=s.choices.map((ch,i)=>{
    const ang=(-90 + i*36)*Math.PI/180, R=140;
    const x=Math.round(Math.cos(ang)*R), y=Math.round(Math.sin(ang)*R);
    const nx=Math.round(Math.cos(ang)*(R-22)), ny=Math.round(Math.sin(ang)*(R-22));
    const col=ch?(ch.safe?GREEN:RED):GREY;
    return { x, y, nx, ny, color:col, n:(i+1), day:DAY_META[i].day, cap: ch?ch.short:'—', ty:y+5, delay:(0.12*i).toFixed(2), ndelay:(0.12*i+0.4).toFixed(2) };
  });

  const unsafeCount=s.choices.filter(c=>c&&!c.safe).length;
  const items=[]; let di=0;
  s.choices.forEach((ch,i)=>{ if(ch&&!ch.safe && di<6){ items.push({text:DAYS[i].incident, delay:(0.25+di*0.45).toFixed(2)}); di++; } });
  if(unsafeCount>6) items.push({text:"…and "+(unsafeCount-6)+" more, still landing.", delay:(0.25+di*0.45).toFixed(2)});
  if(unsafeCount>=6) items.push({text:DATASET.incidentChannel, delay:(0.25+(di+1)*0.45).toFixed(2)});
  const incidentClose = unsafeCount>=6 ? "You will be fine. Probably. This is why the training exists." : "None of it was malicious. That's the part nobody warns you about.";

  let stampCol=GREEN, stampTop='— NO DATA —', stampMid='COMPLETED', stampBot='— WAS LEAKED —', certSub='Awarded, with mild relief, to';
  if(unsafeCount>=1&&unsafeCount<=2){ stampTop='— COMPLETED —'; stampMid='MOSTLY'; stampBot=unsafeCount===1?'— one slip —':'— two slips —'; }
  else if(unsafeCount>=3&&unsafeCount<=5){ stampCol=RED; stampTop='COMPLETED*'; stampMid='*terms'; stampBot='apply'; certSub='Awarded, pending review, to'; }
  else if(unsafeCount>=6){ stampCol=RED; stampTop='— SEE —'; stampMid=DATASET.escalateStamp; stampBot='re: completed'; certSub='Awarded, and immediately escalated, to'; }

  return {
    showChrome:['day','consequence','friday'].includes(s.screen),
    bad, good, badCol,
    dayChapter:(meta.chapter||'')+' · '+(meta.day||'')+(meta.wk===2?' · '+DATASET.wk2Label:''),
    dayTitle:meta.title||'', daySetupCaption:dd.setup||'', daySetupTask:dd.task||'',
    dayCounter:'Decision '+(d+1)+' of 10',
    consLabel:(meta.day||'')+' '+(meta.title||'')+(bad?' · that went poorly':' · no incident'),
    consTitle:meta.title||'', consCaption:cc?cc.cap:'', consNote:cc?cc.note:'',
    continueLabel:d>=9?DATASET.seeReviewLabel:'Next day',
    dayOptions, outRows, envelopes, emailCount:s.emailCount, d,
    dots, confBlocks, spokes,
    endLabel:unsafeCount>=3?'Face the consequences':'Get your certificate',
    incidentItems:items, incidentClose, leakPct:Math.round(s.confidence*100),
    stampCol, stampTop, stampMid, stampBot, certSub,
    today:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}),
    name:s.name
  };
}

// ---- doodle figures ----
function frame(inner, w){ return `<svg viewBox="0 0 200 150" width="${w||210}" height="${Math.round((w||210)*0.75)}" fill="none" stroke="#1a1a1a" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="14" y1="128" x2="186" y2="128"/>${inner}</svg>`; }
function figG(x, anim, inner){ return `<g class="fig" filter="url(#rough)" style="transform-origin:${x}px 126px;animation:${anim}">${inner}</g>`; }
const HEAD  = x=>`<path d="M${x-11} 30 q-6 7 -3 15 q4 9 14 9 q10 0 12 -10 q2 -11 -8 -15 q-9 -3 -15 1z"/>`;
const BODY  = x=>`<path d="M${x} 53 q-2 22 0 44"/>`;
const LEGS  = x=>`<path d="M${x} 97 q-8 15 -13 30"/><path d="M${x} 97 q8 15 13 30"/>`;
const SMILE = x=>`<path d="M${x-8} 32 q3 3 5 0 M${x+3} 32 q3 3 5 0"/><path d="M${x-8} 41 q8 7 16 0"/>`;
const FROWN = x=>`<path d="M${x-8} 33 l5 5 M${x+8} 33 l-5 5"/><path d="M${x-7} 46 q7 -5 14 0"/>`;
const FLAT  = x=>`<path d="M${x-6} 34 q2 2 4 0 M${x+2} 34 q2 2 4 0"/><path d="M${x-6} 44 h12"/>`;
const SHOCK = x=>`<g stroke="#c0392b" stroke-width="2.2"><path d="M${x-30} 26 l-13 -11 M${x+30} 26 l13 -11 M${x-36} 50 l-15 2 M${x+36} 50 l15 2 M${x-16} 14 l-4 -12 M${x+16} 14 l4 -12"/></g>`;
const POSES = {
  cheer:     x=>figG(x,'bob 2.4s ease-in-out infinite', HEAD(x)+SMILE(x)+BODY(x)+LEGS(x)+`<path d="M${x} 60 q-13 -16 -24 -30"/><path d="M${x} 60 q13 -16 24 -30"/>`),
  celebrate: x=>figG(x,'jump 1.5s ease-in-out infinite', HEAD(x)+SMILE(x)+BODY(x)+LEGS(x)+`<path d="M${x} 58 q-9 -20 -13 -34"/><path d="M${x} 58 q9 -20 13 -34"/>`)+`<g stroke="#2f7d32" stroke-width="2"><path d="M${x-31} 22 l-6 -6 M${x+31} 22 l6 -6 M${x-36} 40 l-8 -2 M${x+36} 40 l8 -2"/></g>`,
  point:     x=>figG(x,'nod 2.6s ease-in-out infinite', HEAD(x)+SMILE(x)+BODY(x)+LEGS(x)+`<path d="M${x} 62 q-11 6 -15 1"/><path d="M${x} 60 q16 -7 30 -12"/><path d="M${x+30} 48 l3 -4"/>`),
  coffee:    x=>figG(x,'sway 5s ease-in-out infinite', HEAD(x)+FLAT(x)+BODY(x)+LEGS(x)+`<path d="M${x} 62 q-12 8 -16 15"/><path d="M${x} 62 q9 3 13 -3"/><rect x="${x+11}" y="50" width="10" height="9" rx="1"/><path d="M${x+16} 47 q2 -4 -1 -7" stroke-width="1.4"/>`),
  think:     x=>figG(x,'sway 6s ease-in-out infinite', HEAD(x)+`<path d="M${x-6} 34 q2 2 4 0 M${x+2} 34 q2 2 4 0"/><path d="M${x-4} 44 q6 2 10 0"/>`+BODY(x)+LEGS(x)+`<path d="M${x} 62 q-14 4 -16 12"/><path d="M${x} 60 q10 -4 6 -14"/>`),
  shrug:     x=>figG(x,'sway 4s ease-in-out infinite', HEAD(x)+FLAT(x)+BODY(x)+LEGS(x)+`<path d="M${x} 62 q-14 3 -20 -6"/><path d="M${x} 62 q14 3 20 -6"/>`),
  panic:     x=>figG(x,'swayHard 1.2s ease-in-out infinite', HEAD(x)+FROWN(x)+BODY(x)+LEGS(x)+`<path d="M${x} 60 q-13 -16 -24 -30"/><path d="M${x} 60 q13 -16 24 -30"/>`)+SHOCK(x),
  facepalm:  x=>figG(x,'jitter .5s ease-in-out infinite', HEAD(x)+`<path d="M${x-6} 42 q6 3 12 0"/>`+BODY(x)+LEGS(x)+`<path d="M${x} 60 q4 -12 -6 -16"/><path d="M${x} 62 q-11 10 -13 20"/>`),
  slump:     x=>figG(x,'bob 3.6s ease-in-out infinite', `<g transform="rotate(6 ${x} 40)">`+HEAD(x)+`<path d="M${x-6} 41 h11"/></g>`+BODY(x)+`<path d="M${x} 97 q-4 16 -6 30"/><path d="M${x} 97 q4 16 6 30"/><path d="M${x} 60 q-8 12 -10 24"/><path d="M${x} 60 q8 12 10 24"/>`)
};
function person(pose, x){ x=(x==null?100:x); return (POSES[pose]||POSES.shrug)(x); }
const GOOD_POSES=['cheer','celebrate','point','coffee','think'];
const BAD_POSES=['panic','facepalm','slump'];

// ---- ten scene props ----
const SCENES = {
  0: frame(`
    <g filter="url(#rough)">
      <rect x="56" y="80" width="66" height="40" rx="3"/>
      <path d="M48 120 h82 l8 8 h-98 z"/>
      <path d="M66 90 h42 M66 98 h50 M66 106 h30" stroke-width="1.6"/>
    </g>
    <g filter="url(#rough)" stroke="#c0392b"><path d="M132 34 h42 q7 0 7 7 v20 q0 7 -7 7 h-28 l-11 11 v-11 h-3 q-7 0 -7 -7 v-20 q0 -7 7 -7z"/></g>
    <text x="153" y="62" text-anchor="middle" font-family="Patrick Hand,cursive" font-size="24" fill="#c0392b" stroke="none">!?</text>`),
  3: frame(`
    <g filter="url(#rough)"><rect x="42" y="34" width="116" height="70" rx="3"/><line x1="100" y1="104" x2="100" y2="122"/><line x1="78" y1="122" x2="122" y2="122"/></g>
    <text x="98" y="82" text-anchor="middle" font-family="Patrick Hand,cursive" font-size="34" stroke="none" fill="#1a1a1a">${esc(SCN.statBig)}</text>
    <text x="150" y="58" font-family="Patrick Hand,cursive" font-size="30" stroke="none" fill="#c0392b">${esc(SCN.statMark)}</text>`),
  4: frame(`
    <g filter="url(#rough)"><rect x="40" y="52" width="98" height="64" rx="3"/><path d="M40 56 l49 34 l49 -34"/></g>
    <g filter="url(#rough)"><circle cx="150" cy="98" r="17" stroke="#c0392b"/><line x1="162" y1="110" x2="176" y2="124" stroke="#c0392b" stroke-width="3"/></g>
    <text x="150" y="101" text-anchor="middle" font-family="Courier Prime" font-size="6.5" fill="#c0392b" stroke="none">${esc(SCN.inject[0])}</text>
    <text x="150" y="108" text-anchor="middle" font-family="Courier Prime" font-size="6.5" fill="#c0392b" stroke="none">${esc(SCN.inject[1])}</text>`),
  5: frame(`
    <g filter="url(#rough)"><path d="M100 32 L54 110 L146 110 Z"/></g>
    <circle cx="100" cy="32" r="6" fill="#fff"/><circle cx="54" cy="110" r="6" fill="#fff"/><circle cx="146" cy="110" r="6" fill="#fff"/>
    <text x="100" y="24" text-anchor="middle" font-family="Courier Prime" font-size="8.5" stroke="none" fill="#1a1a1a">${esc(SCN.trifecta[0])}</text>
    <text x="40" y="124" text-anchor="middle" font-family="Courier Prime" font-size="8.5" stroke="none" fill="#1a1a1a">${esc(SCN.trifecta[1])}</text>
    <text x="160" y="124" text-anchor="middle" font-family="Courier Prime" font-size="8.5" stroke="none" fill="#1a1a1a">${esc(SCN.trifecta[2])}</text>`),
  6: frame(`
    <g filter="url(#rough)"><rect x="42" y="42" width="116" height="72" rx="4"/><line x1="42" y1="58" x2="158" y2="58"/></g>
    <circle cx="52" cy="50" r="2.4"/><circle cx="61" cy="50" r="2.4"/><circle cx="70" cy="50" r="2.4"/>
    <text x="52" y="80" font-family="Courier Prime" font-size="11" stroke="none" fill="#c0392b">${esc(SCN.term[0])}</text>
    <text x="52" y="98" font-family="Courier Prime" font-size="11" stroke="none" fill="#1a1a1a">${esc(SCN.term[1])}</text>
    <rect x="120" y="88" width="8" height="13" fill="#1a1a1a" stroke="none" style="animation:blink 1s step-end infinite"/>`),
  7: frame(`
    <g filter="url(#rough)"><rect x="50" y="36" width="100" height="74" rx="5"/></g>
    <g filter="url(#rough)"><circle cx="100" cy="66" r="17"/><path d="M92 64 l3 3 M108 64 l-3 3"/><path d="M92 74 q8 5 16 0"/><path d="M100 83 q-14 3 -16 20"/><path d="M100 83 q14 3 16 20"/></g>
    <circle cx="83" cy="120" r="9" fill="#2f7d32" stroke="none"/><circle cx="117" cy="120" r="9" fill="#c0392b" stroke="none"/>
    <text x="140" y="50" font-family="Patrick Hand,cursive" font-size="20" stroke="none" fill="#c0392b">?</text>`),
  8: frame(`
    <g filter="url(#rough)"><rect x="52" y="92" width="96" height="26" rx="2"/><rect x="58" y="84" width="96" height="26" rx="2"/><rect x="64" y="76" width="96" height="26" rx="2"/></g>
    <g style="transform-origin:112px 90px;animation:swayHard 1.6s ease-in-out infinite">
      <g filter="url(#rough)"><rect x="96" y="30" width="34" height="16" rx="2"/><line x1="113" y1="46" x2="113" y2="60"/><line x1="100" y1="60" x2="126" y2="60"/></g>
      <circle cx="113" cy="86" r="24" fill="none" stroke="#c0392b" stroke-width="2.6" transform="rotate(-14 113 86)"/>
      <text x="113" y="90" text-anchor="middle" font-family="Patrick Hand,cursive" font-size="11" stroke="none" fill="#c0392b" transform="rotate(-14 113 86)">${esc(SCN.stampWord)}</text>
    </g>`),
  9: frame(`
    <g filter="url(#rough)"><circle cx="88" cy="76" r="30"/><line x1="88" y1="50" x2="88" y2="74"/></g>
    <g filter="url(#rough)" stroke-width="2"><rect x="132" y="54" width="20" height="20" rx="2"/><rect x="140" y="66" width="20" height="20" rx="2"/><rect x="148" y="78" width="20" height="20" rx="2"/></g>
    <text x="150" y="112" text-anchor="middle" font-family="Patrick Hand,cursive" font-size="15" stroke="none" fill="#c0392b">&times;3&hellip;</text>`)
};

// ---- screen renderers ----
function chrome(v){
  const dots = v.dots.map(dot=>`<div style="width:13px;height:13px;border:2px solid #1a1a1a;border-radius:255px 15px 225px 15px/15px 225px 15px 255px;background:${dot.fill}${dot.active?';animation:dotPulse .5s ease':''}"></div>`).join('');
  const blocks = v.confBlocks.map(b=>`<div class="${b.fresh?'confpop':''}" style="width:8px;height:13px;border:1px solid #1a1a1a;background:${b.fill}"></div>`).join('');
  return `<div data-noprint style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:10.5px;color:#555;margin-bottom:5px">${esc(v.dayCounter)}</div>
        <div style="display:flex;gap:5px">${dots}</div>
      </div>
      <div style="text-align:right;max-width:270px">
        <div style="font-size:10.5px;line-height:1.3;color:#555;margin-bottom:4px">${esc(DATASET.confLabel)}</div>

  </div>`;
}

      <circle cx="${sp.x}" cy="${sp.y}" r="21" fill="${sp.color}" opacity="0.10"/>

      </div>
      <div style="position:absolute;top:24px;right:24px;width:100px;height:100px;border:3px solid ${v.stampCol};border-radius:50%;display:flex;align-items:center;justify-content:center;transform:rotate(-11deg);color:${v.stampCol};text-align:center;font-family:'Patrick Hand',cursive;line-height:1;animation:stampIn .6s ease both;animation-delay:.3s">
        <div><div style="font-size:9px;letter-spacing:1px">${esc(v.stampTop)}</div><div style="font-size:18px;margin:3px 0">${esc(v.stampMid)}</div><div style="font-size:9px;letter-spacing:1px">${esc(v.stampBot)}</div></div>
      </div>
    </div>
    <div data-noprint style="display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap">
      <div data-act="print" class="blob" style="font-family:'Patrick Hand',cursive;font-size:20px;padding:9px 28px;border:3px solid #1a1a1a;border-radius:${BLOB_RADIUS}">Print it &#128424;</div>
      <div data-act="restart" class="blob2" style="font-family:'Courier Prime',monospace;font-size:14px;padding:11px 24px;border:2px solid #1a1a1a;border-radius:15px 255px 15px 225px/225px 15px 255px 15px;background:transparent">Start over</div>
      <div data-act="about" class="blob2" style="font-family:'Courier Prime',monospace;font-size:14px;padding:11px 24px;border:2px solid #1a1a1a;border-radius:${BLOB_RADIUS};background:transparent">Sources &amp; why</div>
    </div>
  </div>`;
}

// ---- render + events ----
function render(){
  const v=computeVals();
  let html='';
  if(v.showChrome) html+=chrome(v);
  switch(state.screen){
    case 'landing': html+=landing(); break;
    case 'about': html+=about(); break;
    case 'day': html+=dayScreen(v); break;
    case 'consequence': html+=consequence(v); break;
    case 'friday': html+=friday(v); break;
    case 'incident': html+=incident(v); break;
    case 'cert': html+=cert(v); break;
  }
  const app=document.getElementById('app');
  app.innerHTML=html;
  if(state.screen!=='consequence'||state.day!==2) window.scrollTo(0,0);

  app.querySelectorAll('[data-rot]').forEach(el=>{
    const rot=el.getAttribute('data-rot');
    el.addEventListener('mouseenter',()=>{ el.style.transform=`translateY(-2px) rotate(${rot}deg)`; });
    el.addEventListener('mouseleave',()=>{ el.style.transform=''; });
    el.addEventListener('mousedown',()=>{ el.style.transform='translateY(1px)'; });
  });
  app.querySelectorAll('[data-choose]').forEach(el=>{
    el.addEventListener('click',()=>{ const [dy,idx]=el.getAttribute('data-choose').split(':').map(Number); choose(dy,idx); });
  });
  app.querySelectorAll('[data-act]').forEach(el=>{
    el.addEventListener('click',()=>{
      switch(el.getAttribute('data-act')){
        case 'start': start(); break;
        case 'about': state.screen='about'; render(); break;
        case 'landing': state.screen='landing'; render(); break;
        case 'continue': continueDay(); break;
        case 'end': gotoEnd(); break;
        case 'cert': state.screen='cert'; render(); break;
        case 'print': window.print(); break;
        case 'restart': restart(); break;
      }
    });
  });
  const ni=document.getElementById('nameInput');
  if(ni) ni.addEventListener('input',e=>{ state.name=e.target.value; const pn=document.getElementById('printName'); if(pn) pn.textContent=e.target.value; });
}

render();
</script>
</body>
</html>
