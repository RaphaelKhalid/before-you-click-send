const SOURCES = DATASET.sources;
const DAY_META = DATASET.dayMeta;
const DAYS = DATASET.days;
const SCN = DATASET.scene;
const RED='#c0392b', GREEN='#2f7d32', GREY='#b7b5ac';
const RADII = ['255px 15px 225px 15px/15px 225px 15px 255px','15px 255px 15px 225px/225px 15px 255px 15px','225px 18px 255px 20px/20px 255px 18px 225px'];
const ROT = ['-.5','.5','-.7'];
const BLOB_RADIUS = '255px 15px 225px 15px/15px 225px 15px 255px';

// ---- state ----
const state = { screen:'landing', day:0, choices:Array(10).fill(null), confidence:0.06, emailCount:0, emailTarget:340, name:'', orders:[], lastFilled:1 };
let emailTimer = null;

function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function srcLink(s){ return s&&s.url ? `<a href="${esc(s.url)}" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:underline;text-underline-offset:2px">${esc(s.cite)}&nbsp;&#8599;</a>` : esc(s&&s.cite||''); }
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

const start = () => { state.screen='day'; state.day=0; state.choices=Array(10).fill(null); state.confidence=0.06; state.lastFilled=Math.round(0.06*22); state.orders=DAYS.map(()=>shuffle([0,1,2])); render(); };
function choose(dayIdx, optIdx){
  const opt=DAYS[dayIdx].opts[optIdx];
  state.choices[dayIdx]={ safe:opt.safe, short:opt.short, cap:opt.cap, note:opt.note, pick:optIdx, bump:opt.bump };
  state.lastFilled=Math.round(state.confidence*22);
  state.confidence=Math.min(1, state.confidence + opt.bump);
  const target=opt.emailTarget||1;
  state.emailTarget=target;
  state.citeOpen=false;
  state.screen='consequence';
  render();
  if(dayIdx===2) startEmails(target);
}
function startEmails(target){
  state.emailCount=0; clearInterval(emailTimer);
  const step=Math.max(1, Math.round(target/42));
  emailTimer=setInterval(()=>{
    const n=Math.min(target, state.emailCount+step);
    state.emailCount=n;
    if(n>=target) clearInterval(emailTimer);
    render();
  },24);
}
const continueDay = () => { const d=state.day; if(d>=9){ state.reviewOpen=worstDay(); state.screen='friday'; } else { state.screen='day'; state.day=d+1; } render(); };
const gotoEnd = () => { saveBest(); const u=state.choices.filter(c=>c&&!c.safe).length; state.screen = u>=3 ? 'incident' : 'cert'; render(); };

function worstDay(){ let w=0,b=-1; state.choices.forEach((c,i)=>{ if(c&&!c.safe&&c.bump>b){b=c.bump;w=i;} }); return b<0?0:w; }
const BEST_KEY = 'byc_best_'+DATASET.slug;
function readBest(){ try{ const v=parseInt(localStorage.getItem(BEST_KEY),10); return isNaN(v)?null:v; }catch(e){ return null; } }
function saveBest(){ try{ const clean=state.choices.filter(c=>c&&c.safe).length; const prev=readBest(); if(prev===null||clean>prev){ localStorage.setItem(BEST_KEY, String(clean)); state.newBest=(prev!==null&&clean>prev); } else state.newBest=false; }catch(e){} }
const restart = () => { clearInterval(emailTimer); state.screen='landing'; state.day=0; state.choices=Array(10).fill(null); state.confidence=0.06; state.emailCount=0; render(); };

// ---- computed values ----
function computeVals(){
  const s=state, d=s.day, cc=s.choices[d];
  const meta=DAY_META[d]||{}, dd=DAYS[d]||{opts:[]};
  const bad=cc&&!cc.safe, good=cc&&cc.safe;
  const badCol=bad?RED:(good?GREEN:'#1a1a1a');

  let activeIdx=-1;
  if(s.screen==='day'||s.screen==='consequence') activeIdx=d;
  else if(['friday','incident','cert'].includes(s.screen)) activeIdx=10;
  const dots=Array.from({length:10},(_,i)=>({ fill:i<activeIdx?'#1a1a1a':(i===activeIdx?'#c0392b':'#fff'), active:i===activeIdx }));

  const filled=Math.round(s.confidence*22);
  const confBlocks=Array.from({length:22},(_,i)=>({fill:i<filled?'#c0392b':'#fff', fresh:(i>=s.lastFilled&&i<filled)}));

  const order=s.orders[d]||[0,1,2];
  const dayOptions=order.map((origIdx,i)=>{ const o=dd.opts[origIdx]; return { text:o.text, letter:String.fromCharCode(65+i), radius:RADII[i%3], rot:ROT[i%3], origIdx, day:d, i }; });

  const outRows=PEOPLE.map((p,i)=>({ name: bad ? p.name : (DATASET.echo.anonPrefix)+String.fromCharCode(65+i), val:p.val, delay:(0.15*i).toFixed(2) }));
  const shownCount=Math.min(150, Math.max(1, Math.round(s.emailCount/(s.emailTarget>340?4.6:2.6))));
  const envelopes=Array.from({length:shownCount},(_,i)=>({delay:(i*0.01).toFixed(3)}));

  const spokes=s.choices.map((ch,i)=>{
    const ang=(-90 + i*36)*Math.PI/180, R=140;
    const x=Math.round(Math.cos(ang)*R), y=Math.round(Math.sin(ang)*R);
    const nx=Math.round(Math.cos(ang)*(R-22)), ny=Math.round(Math.sin(ang)*(R-22));
    const col=ch?(ch.safe?GREEN:RED):GREY;
    return { x, y, nx, ny, color:col, n:(i+1), day:DAY_META[i].day, cap: ch?ch.short:'—', ty:y+5, delay:(0.12*i).toFixed(2), ndelay:(0.12*i+0.4).toFixed(2) };
  });

  const unsafeCount=s.choices.filter(c=>c&&!c.safe).length;
  const cleanCount=s.choices.filter(c=>c&&c.safe).length;
  const habitBroke={}, habitSeen={};
  s.choices.forEach((c,i)=>{ if(!c) return; const h=DATASET.dayLesson[i].h; habitSeen[h]=true; if(!c.safe) habitBroke[h]=Math.max(habitBroke[h]||0, c.bump||0); });
  const habitStatus=HABITS.map((t,h)=>({text:t, kept: habitSeen[h] ? !habitBroke[h] : true, seen:!!habitSeen[h]}));
  const toWorkOn=Object.keys(habitBroke).map(h=>({h:+h, sev:habitBroke[h]})).sort((a,b)=>b.sev-a.sev).slice(0,3).map(x=>HABITS[x.h]);
  const items=[]; let di=0;
  s.choices.forEach((ch,i)=>{ if(ch&&!ch.safe && di<6){ items.push({text:DAYS[i].incident, delay:(0.25+di*0.45).toFixed(2)}); di++; } });
  if(unsafeCount>6) items.push({text:"And "+(unsafeCount-6)+" further consequences from the same two weeks.", delay:(0.25+di*0.45).toFixed(2)});
  if(unsafeCount>=6) items.push({text:DATASET.incidentChannel, delay:(0.25+(di+1)*0.45).toFixed(2)});
  const incidentClose = unsafeCount>=6 ? "Most of these outcomes are preventable, which is the purpose of this course." : "None of these were deliberate, which is exactly what makes them easy to repeat.";

  let stampCol=GREEN, stampTop='COURSE', stampMid='PASSED', stampBot='no data exposed', certSub='Completed by';
  if(unsafeCount>=1&&unsafeCount<=2){ stampTop='COURSE'; stampMid='PASSED'; stampBot=(unsafeCount===1?'1 to review':'2 to review'); }
  else if(unsafeCount>=3&&unsafeCount<=5){ stampCol=RED; stampTop='REVIEW'; stampMid='ADVISED'; stampBot='see summary'; certSub='Completed, with items to review, by'; }
  else if(unsafeCount>=6){ stampCol=RED; stampTop='RETAKE'; stampMid='ADVISED'; stampBot='see summary'; certSub='Completed; a retake is recommended for'; }

  return {
    showChrome:['day','consequence','friday'].includes(s.screen),
    bad, good, badCol,
    dayChapter:(meta.chapter||'')+' · '+(meta.day||'')+' · '+(meta.wk===2?DATASET.wk2Label:DATASET.wk1Label),
    dayTitle:meta.title||'', daySetupCaption:dd.setup||'', daySetupTask:dd.task||'',
    dayCounter:'Decision '+(d+1)+' of 10',
    consLabel:(meta.day||'')+' '+(meta.title||'')+(bad?' · that went poorly':' · no incident'),
    consTitle:meta.title||'', consCaption:cc?cc.cap:'', consNote:cc?cc.note:'',
    continueLabel:d>=9?DATASET.seeReviewLabel:'Next day',
    dayOptions, outRows, envelopes, emailCount:s.emailCount, d,
    dots, confBlocks, spokes,
    endLabel:unsafeCount>=3?'Face the consequences':'Get your certificate',
    unsafeCount, cleanCount, habitStatus, toWorkOn, best:readBest(), newBest:!!s.newBest,
    incidentItems:items, incidentClose, leakPct:Math.round(s.confidence*100),
    stampCol, stampTop, stampMid, stampBot, certSub,
    today:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}),
    name:s.name
  };
}

function figFrame(inner, w){ return `<svg viewBox="0 0 200 162" width="${w||212}" height="${Math.round((w||212)*0.81)}" fill="none" stroke="#1a1a1a" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="14" y1="140" x2="186" y2="140"/>${inner}</svg>`; }
const ANIM={ neutral:'sway 5s ease-in-out infinite', cheer:'bob 2.4s ease-in-out infinite', celebrate:'jump 1.5s ease-in-out infinite', point:'nod 2.6s ease-in-out infinite', coffee:'sway 5s ease-in-out infinite', think:'sway 6s ease-in-out infinite', shrug:'sway 4s ease-in-out infinite', panic:'swayHard 1.2s ease-in-out infinite', facepalm:'jitter .5s ease-in-out infinite', slump:'bob 3.6s ease-in-out infinite' };
function hand(x,y){ return `<circle cx="${x}" cy="${y}" r="3.7" fill="#fff" stroke-width="2.3"/>`; }
function figArms(pose,x){ switch(pose){

  case 'celebrate': return `<path d="M${x-15} 66 q-8 -18 -12 -32" stroke-width="3"/><path d="M${x+15} 66 q8 -18 12 -32" stroke-width="3"/>`+hand(x-28,32)+hand(x+28,32)+`<g stroke="${GREEN}" stroke-width="2"><path d="M${x-31} 20 l-5 -6 M${x+31} 20 l5 -6 M${x-38} 38 l-7 -2 M${x+38} 38 l7 -2"/></g>`;
  case 'point': return `<path d="M${x-15} 69 q-9 5 -13 1" stroke-width="3"/>`+hand(x-29,72)+`<path d="M${x+15} 66 q12 -8 25 -14" stroke-width="3"/><path d="M${x+40} 51 l4 -3" stroke-width="2.6"/>`;

  case 'think': return `<path d="M${x-15} 70 q-13 6 -14 14" stroke-width="3"/>`+hand(x-30,86)+`<path d="M${x+15} 66 q10 -3 6 -13" stroke-width="3"/>`+hand(x+20,50);
  case 'panic': return `<path d="M${x-15} 68 q-10 -13 -18 -28" stroke-width="3"/><path d="M${x+15} 68 q10 -13 18 -28" stroke-width="3"/>`+hand(x-35,38)+hand(x+35,38)+`<g stroke="#c0392b" stroke-width="2.2"><path d="M${x-31} 22 l-11 -9 M${x+31} 22 l11 -9 M${x-40} 46 l-13 2 M${x+40} 46 l13 2"/></g>`;
  case 'facepalm': return `<path d="M${x-15} 69 q-10 10 -12 19" stroke-width="3"/>`+hand(x-28,90)+`<path d="M${x+15} 66 q7 -12 -3 -18" stroke-width="3"/>`;

  default: return `<path d="M${x-15} 69 q-7 14 -6 24" stroke-width="3"/><path d="M${x+15} 69 q7 14 6 24" stroke-width="3"/>`+hand(x-22,95)+hand(x+22,95);
}}
function figFace(pose,x,C){
  const eyes=C.glasses
    ? `<circle cx="${x-6}" cy="40" r="4.4" fill="#fff" stroke-width="2"/><circle cx="${x+6}" cy="40" r="4.4" fill="#fff" stroke-width="2"/><path d="M${x-1.6} 40 h3.2 M${x+10} 39 l4 -1.5 M${x-14} 39 l4 1.5" stroke-width="1.6"/><circle cx="${x-6}" cy="40" r="1.1" fill="#1a1a1a" stroke="none"/><circle cx="${x+6}" cy="40" r="1.1" fill="#1a1a1a" stroke="none"/>`
    : `<path d="M${x-7} 38 q1.6 2 3.2 0 M${x+3.8} 38 q1.6 2 3.2 0" stroke-width="2.3"/>`;
  let mouth;
  if(pose==='panic') mouth=`<ellipse cx="${x}" cy="48" rx="4" ry="3" fill="#fff" stroke-width="2.2"/>`;
  else if(pose==='slump'||pose==='facepalm') mouth=`<path d="M${x-6} 49 q6 -3 12 0" stroke-width="2.2"/>`;
  else if(pose==='think') mouth=`<path d="M${x-4} 47 q6 2 9 -1" stroke-width="2.2"/>`;
  else mouth=`<path d="M${x-7} 45 q7 6 14 0" stroke-width="2.5"/>`;
  const brows= pose==='panic'?`<path d="M${x-10} 33 l6 3 M${x+10} 33 l-6 3" stroke-width="2"/>`:'';
  return eyes+mouth+brows;
}
function figHair(x,C){
  return C.hair==='bun'
    ? `<path d="M${x-14} 33 q5 -11 14 -11 q10 0 14 11" stroke-width="2.6"/><circle cx="${x+14}" cy="29" r="5" fill="#fff" stroke-width="2.3"/>`
    : `<path d="M${x-12} 31 q4 -9 12 -9 q9 0 13 9" stroke-width="2.6"/><path d="M${x-3} 24 l1 -4 M${x+4} 24 l1 -4" stroke-width="1.9"/>`;
}
function character(pose,x){
  x=(x==null?100:x); const C=DATASET.character||{shirt:'#8ecae6',accent:'#e07a5f',hair:'short',glasses:false,badge:true};
  const together=(pose==='slump');
  const legs= together
    ? `<path d="M${x-5} 108 q-2 15 -4 26" stroke-width="3"/><path d="M${x+5} 108 q2 15 4 26" stroke-width="3"/><path d="M${x-13} 133 q5 4 11 1" stroke-width="4"/><path d="M${x+2} 134 q5 3 11 -1" stroke-width="4"/>`
    : `<path d="M${x-8} 108 q-4 16 -6 26" stroke-width="3"/><path d="M${x+8} 108 q4 16 6 26" stroke-width="3"/><path d="M${x-20} 134 q6 4 12 1" stroke-width="4"/><path d="M${x+8} 135 q6 3 12 -1" stroke-width="4"/>`;
  const torso=`<path d="M${x-16} 66 q16 -7 32 0 l-4 42 q-12 5 -24 0z" fill="${C.shirt}" stroke-width="3"/>`;
  const acc= C.badge
    ? `<path d="M${x-4} 60 l5 26 M${x+4} 60 l-1 26" stroke="${C.accent}" stroke-width="2"/><rect x="${x-4}" y="84" width="10" height="8" rx="1.5" fill="#fff" stroke="${C.accent}" stroke-width="1.6"/>`
    : `<path d="M${x-11} 65 l11 8 l11 -8" stroke="${C.accent}" stroke-width="1.8"/><path d="M${x} 73 v32" stroke="${C.accent}" stroke-width="1.6"/><circle cx="${x-8}" cy="80" r="1.4" fill="${C.accent}" stroke="none"/><circle cx="${x+8}" cy="80" r="1.4" fill="${C.accent}" stroke="none"/>`;
  const tilt= pose==='slump'?6:(pose==='facepalm'?4:0);
  const headExtra = pose==='facepalm' ? `<path d="M${x-7} 40 q7 4 14 0" stroke-width="2"/>` : figFace(pose,x,C);
  const headG=`<g${tilt?` transform="rotate(${tilt} ${x} 44)"`:''}><circle cx="${x}" cy="40" r="16" fill="#fff" stroke-width="3"/>${figHair(x,C)}${headExtra}</g>`;
  const shadow=`<ellipse cx="${x}" cy="141" rx="${together?26:30}" ry="4.5" fill="#1a1a1a" opacity="0.15" filter="url(#shadow)"/>`;
  return `${shadow}<g class="fig" filter="url(#rough)" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" style="transform-origin:${x}px 138px;animation:${ANIM[pose]||ANIM.neutral}">${legs}${torso}${acc}${figArms(pose,x)}${headG}</g>`;
}

// ---- screen renderers ----
function chrome(v){
  const dots = v.dots.map(dot=>`<div style="width:13px;height:13px;border:2px solid #1a1a1a;border-radius:255px 15px 225px 15px/15px 225px 15px 255px;background:${dot.fill}${dot.active?';animation:dotPulse .5s ease':''}"></div>`).join('');
  const blocks = v.confBlocks.map(b=>`<div class="${b.fresh?'confpop':''}" style="width:8px;height:13px;border:1px solid #1a1a1a;background:${b.fill}"></div>`).join('');
  const onDay=(state.screen==='day'||state.screen==='consequence');
  const counterLabel = onDay ? v.dayCounter : DATASET.doneLabel;
  return `<div data-noprint style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:10.5px;color:#555;margin-bottom:5px">${esc(counterLabel)}</div>
        <div style="display:flex;gap:5px">${dots}</div>
      </div>
      <div style="text-align:right;max-width:270px">
        <div style="font-size:10.5px;line-height:1.3;color:#555;margin-bottom:4px">${esc(DATASET.confLabel)}</div>
        <div style="display:flex;gap:2px;justify-content:flex-end">${blocks}</div>
        <div style="font-size:8.5px;color:#c0392b;margin-top:3px;letter-spacing:.5px">${esc(DATASET.meterLegend[0])} &rarr; ${esc(DATASET.meterLegend[1])}</div>
      </div>
    </div>
    <div style="position:relative;height:38px;overflow:hidden;border-bottom:2px dashed #cfcdc4">
      <svg viewBox="0 0 40 48" width="30" height="36" fill="none" stroke="#1a1a1a" stroke-width="2.4" stroke-linecap="round" style="position:absolute;bottom:0;left:-52px;animation:stroll 9s linear infinite">
        <g class="fig" filter="url(#rough2)" style="animation:waddle .62s ease-in-out infinite">
          <path d="M14 6 q-4 4 -2 9 q3 5 8 5 q6 0 7 -6 q1 -6 -5 -8 q-5 -2 -8 0z"/>
          <path d="M20 18 q-1 8 0 15"/>
          <path d="M20 33 q-5 7 -8 14"/><path d="M20 33 q6 6 9 12"/>
          <path d="M20 23 q-6 3 -9 6"/><path d="M20 23 q6 -3 10 -6"/>
        </g>
      </svg>
    </div>
  </div>`;
}

function about(){
  const src = SOURCES.map(s=>`<div style="border-left:3px solid #1a1a1a;padding:6px 12px;font-size:12.5px;line-height:1.5;background:#fff"><b>${esc(s.topic)}</b> &mdash; ${esc(s.text)} <span style="color:#777">(${srcLink(s)})</span></div>`).join('');
  const secs = DATASET.about.sections.map(x=>`<div style="font-family:'Patrick Hand',cursive;font-size:19px;margin:20px 0 6px">${esc(x.h)}</div><p style="font-size:14px;line-height:1.6;margin:0 0 8px;color:#333">${esc(x.p)}</p>`).join('');
  return `<div style="animation:fadeUp .4s ease both;max-width:600px;margin:0 auto">
    <div data-act="landing" class="lnk" style="font-size:13px;color:#555;margin-bottom:14px">&larr; back</div>
    <h2 style="font-family:'Patrick Hand',cursive;font-size:34px;margin:0 0 4px;font-weight:400">${esc(DATASET.about.title)}</h2>
    ${secs}
    <div style="font-family:'Patrick Hand',cursive;font-size:19px;margin:20px 0 6px">${esc(DATASET.about.sourcesHeading)}</div>
    <div style="display:flex;flex-direction:column;gap:8px">${src}</div>
    <div style="font-family:'Patrick Hand',cursive;font-size:19px;margin:20px 0 6px">Assumptions &amp; limits</div>
    <p style="font-size:13px;line-height:1.6;margin:0 0 8px;color:#555">${esc(DATASET.about.assumptionsP)}</p>
    <div style="font-family:'Patrick Hand',cursive;font-size:19px;margin:20px 0 6px">How to deploy it</div>
    <p style="font-size:13px;line-height:1.6;margin:0 0 20px;color:#555">${esc(DATASET.about.deployP)}</p>
    <div data-act="start" class="blob" style="display:inline-block;font-family:'Patrick Hand',cursive;font-size:22px;padding:10px 34px;border:3px solid #1a1a1a;border-radius:${BLOB_RADIUS}">${esc(DATASET.about.startLabel)} &rarr;</div>
  </div>`;
}

function dayScreen(v){
  const d=v.d;
  let setupExtra='';
  if(d===1){
    const rows=PEOPLE.map(p=>`<div style="display:grid;grid-template-columns:1.6fr 1fr;padding:6px 10px;border-top:1px solid #ddd"><span>${esc(p.name)}</span><span style="text-align:right">${esc(p.val)}</span></div>`).join('');
    setupExtra=`<div style="border:2.5px solid #1a1a1a;background:#fff;margin:0 auto 16px;max-width:420px;font-size:12.5px">
      <div style="display:grid;grid-template-columns:1.6fr 1fr;background:#1a1a1a;color:#fff;padding:6px 10px;font-weight:700"><span>Name</span><span style="text-align:right">${esc(DATASET.echo.col2)}</span></div>
      ${rows}
      <div style="padding:5px 10px;border-top:1px solid #ddd;color:#999;font-style:italic">${esc(DATASET.echo.footer)}</div>
    </div>`;
  } else if(d===2){
    const wf=DATASET.workflow;
    const cal=wf.days.map((n,i)=>i===wf.highlightIdx?`<span style="border:2px solid #c0392b;border-radius:50%;font-weight:700;color:#c0392b">${esc(n)}</span>`:`<span>${esc(n)}</span>`).join('');
    setupExtra=`<div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;align-items:center;margin-bottom:16px">
      <div style="border:2.5px solid #1a1a1a;background:#fff;padding:8px;text-align:center;width:120px">
        <div style="font-size:11px;font-weight:700;border-bottom:1.5px solid #1a1a1a;padding-bottom:3px;margin-bottom:4px">${esc(wf.monthLabel)}</div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:2px;font-size:10px">${cal}</div>
        <div style="font-size:9px;color:#c0392b;margin-top:4px;font-weight:700">${esc(wf.badge)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:12px">
        <div style="border:2px solid #1a1a1a;border-radius:8px;padding:8px 10px;background:#fff">${esc(wf.step[0][0])}<br>${esc(wf.step[0][1])}</div>
        <span style="font-size:18px">&rarr;</span>
        <div style="border:2px solid #1a1a1a;border-radius:8px;padding:8px 10px;background:#fff">${esc(wf.step[1][0])}<br>${esc(wf.step[1][1])}</div>
        <span style="font-size:18px">&rarr;</span>
        <div style="border:2px solid #1a1a1a;border-radius:8px;padding:8px 10px;background:#fff">${esc(wf.step[2][0])}<br><b>${esc(wf.sendN)}</b></div>
      </div>
    </div>`;
  } else {
    setupExtra=`<div style="display:flex;justify-content:center;margin:2px 0 14px">${SCENES[d]||figFrame(person('coffee'))}</div>`;
  }
  const opts=v.dayOptions.map(o=>`<div data-choose="${o.day}:${o.origIdx}" class="opt" style="border:2.5px solid #1a1a1a;border-radius:${o.radius};padding:15px 18px;background:#fff;font-size:14.5px;line-height:1.45;animation-delay:${(0.06*o.i+0.05).toFixed(2)}s" data-rot="${o.rot}"><b>${o.letter}.</b> ${esc(o.text)}</div>`).join('');
  return `<div style="animation:fadeUp .4s ease both">
    <div style="font-family:'Patrick Hand',cursive;font-size:15px;color:#c0392b;letter-spacing:1px;text-transform:uppercase">${esc(v.dayChapter)}</div>
    <h2 style="font-family:'Patrick Hand',cursive;font-size:clamp(30px,7vw,40px);margin:2px 0 16px;font-weight:400">${esc(v.dayTitle)}</h2>
    <div style="border:2.5px solid #1a1a1a;border-radius:14px 245px 20px 245px/245px 18px 245px 20px;padding:16px 20px;background:#fff;font-size:14.5px;line-height:1.55;margin-bottom:16px">${esc(v.daySetupCaption)}</div>
    ${setupExtra}
    <p style="text-align:center;margin:0 0 14px;font-family:'Patrick Hand',cursive;font-size:22px">${esc(v.daySetupTask)}</p>
    <div style="display:flex;flex-direction:column;gap:13px">${opts}</div>
  </div>`;
}

function consequence(v){
  const d=v.d;
  let vis='';
  if(d===1){
    const rows=v.outRows.map(r=>`<div style="display:flex;justify-content:space-between;gap:12px;padding:2px 0;color:${v.badCol};animation:popIn .3s ease both;animation-delay:${r.delay}s"><span>${esc(r.name)}</span><span>${esc(r.val)}</span></div>`).join('');
    vis=`<div style="display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:20px">
      <div style="border:2px solid #1a1a1a;background:#fff;width:150px;opacity:.5;font-size:11px">
        <div style="background:#1a1a1a;color:#fff;padding:4px 8px">${esc(DATASET.echo.fileName)}</div>
        <div style="padding:8px;line-height:1.6;color:#666">${esc(DATASET.echo.blob[0])}<br>${esc(DATASET.echo.blob[1])}<br>${esc(DATASET.echo.blob[2])}</div>
      </div>
      <span style="font-size:24px">&rarr;</span>
      <svg viewBox="0 0 70 70" width="66" height="66" fill="none" stroke="#1a1a1a" stroke-width="2.6"><g filter="url(#rough)"><circle cx="35" cy="35" r="26"/></g><text x="35" y="41" text-anchor="middle" font-family="Courier Prime" font-size="9" stroke="none" fill="#1a1a1a">the AI</text></svg>
      <span style="font-size:24px">&rarr;</span>
      <div style="border:2.5px solid #1a1a1a;background:#fff;min-width:200px;font-size:12px;border-radius:6px;overflow:hidden">
        <div style="background:#1a1a1a;color:#fff;padding:5px 9px">AI output <span style="animation:blink 1s step-end infinite">&#9611;</span></div>
        <div style="padding:9px">
          <div style="font-style:italic;color:#555;margin-bottom:6px">Summary of findings:</div>
          ${rows}
        </div>
      </div>
    </div>`;
  } else if(d===2){
    const envs=v.envelopes.map(e=>`<svg width="24" height="17" viewBox="0 0 24 17" fill="none" stroke="#1a1a1a" stroke-width="1.6" style="animation:popIn .25s ease both;animation-delay:${e.delay}s"><rect x="1" y="1" width="22" height="15" rx="1"/><path d="M1 2 l11 8 l11 -8"/></svg>`).join('');
    vis=`<div style="margin-bottom:20px">
      <div style="text-align:center;font-family:'Patrick Hand',cursive;font-size:44px;color:${v.badCol}">${v.emailCount}</div>
      <div style="text-align:center;font-size:12px;color:#555;margin-bottom:12px">${esc(DATASET.cascadeUnit)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:520px;margin:0 auto;min-height:40px">${envs}</div>
    </div>`;
  } else {
    const pose = v.bad ? BAD_POSES[d%BAD_POSES.length] : GOOD_POSES[d%GOOD_POSES.length];
    vis=`<div style="display:flex;justify-content:center;margin-bottom:18px">${figFrame(person(pose))}</div>`;
  }
  const dl=DATASET.dayLesson[d];
  const safeOpt=DAYS[d].opts.find(o=>o.safe)||DAYS[d].opts[0];
  const habit=HABITS[dl.h], src=SOURCES[dl.s];
  const teachHead = v.bad ? 'What good would have looked like' : 'Why that worked';
  const teach=`<div style="border:2.5px solid ${GREEN};border-left-width:7px;border-radius:6px 220px 8px 220px/220px 8px 220px 8px;background:#fbfdfb;padding:13px 18px;margin-bottom:22px;animation:fadeUp .4s ease .25s both">
      <div style="font-family:'Patrick Hand',cursive;font-size:16px;color:${GREEN};margin-bottom:4px">${teachHead}</div>
      <div style="font-size:13.5px;line-height:1.5;margin-bottom:9px">${v.bad?'The move was: ':''}<b>${esc(safeOpt.text)}</b></div>
      <div style="display:inline-flex;align-items:center;gap:6px;font-size:12px;background:#eef5ee;border:1.5px solid ${GREEN};border-radius:14px 4px 14px 4px;padding:3px 11px;color:#1a1a1a"><span style="color:${GREEN}">&#9745;</span>${esc(habit)}</div>
      <div data-act="cite" style="cursor:pointer;font-size:11px;color:#777;margin-top:9px;text-decoration:underline;text-underline-offset:3px">${state.citeOpen?'&#9662;':'&#9656;'} the evidence</div>
      ${state.citeOpen?`<div style="font-size:11.5px;line-height:1.5;color:#555;border-top:1px solid #e2e0d7;margin-top:7px;padding-top:7px"><b>${esc(src.topic)}</b> &mdash; ${esc(src.text)} <span style="color:#888">(${srcLink(src)})</span></div>`:''}
    </div>`;
  return `<div style="animation:fadeUp .4s ease both">
    <div style="font-family:'Patrick Hand',cursive;font-size:15px;letter-spacing:1px;text-transform:uppercase;color:${v.badCol}">${esc(v.consLabel)}</div>
    <h2 style="font-family:'Patrick Hand',cursive;font-size:clamp(26px,6vw,34px);margin:2px 0 18px;font-weight:400">${esc(v.consTitle)} &mdash; continued</h2>
    ${vis}
    <div style="border:2.5px solid ${v.badCol};border-radius:14px 245px 20px 245px/245px 18px 245px 20px;padding:16px 20px;background:#fff;font-size:15px;line-height:1.6;margin-bottom:12px">${esc(v.consCaption)}</div>
    <div style="text-align:center;font-family:'Patrick Hand',cursive;font-size:24px;margin-bottom:20px;color:${v.badCol}">${esc(v.consNote)}</div>
    ${teach}
    <div style="text-align:center">
      <div data-act="continue" class="blob" style="display:inline-block;font-family:'Patrick Hand',cursive;font-size:22px;padding:10px 34px;border:3px solid #1a1a1a;border-radius:${BLOB_RADIUS}">${esc(v.continueLabel)} &rarr;</div>
    </div>
  </div>`;
}

function reviewPanel(d){
  const c=state.choices[d], meta=DAY_META[d], dl=DATASET.dayLesson[d];
  const safeOpt=DAYS[d].opts.find(o=>o.safe)||DAYS[d].opts[0];
  const col=c?(c.safe?GREEN:RED):GREY, src=SOURCES[dl.s], habit=HABITS[dl.h];
  const verdict=c?(c.safe?`<span style="color:${GREEN}">&#10003; solid</span>`:`<span style="color:${RED}">&#10007; risky</span>`):'';
  return `<div style="border:2.5px solid #1a1a1a;border-left:7px solid ${col};border-radius:8px 220px 10px 220px/220px 10px 220px 10px;background:#fff;padding:14px 18px;margin:4px 0 18px;animation:fadeUp .3s ease both">
    <div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap">
      <div style="font-family:'Patrick Hand',cursive;font-size:20px">${d+1}. ${esc(meta.title)}</div>
      <div style="font-size:11px;color:#777">${esc(meta.chapter)} &middot; ${esc(meta.day)}</div>
    </div>
    <div style="font-size:13.5px;margin:8px 0 4px">You chose: <b style="color:${col}">${c?esc(c.short):'&mdash;'}</b> ${verdict}</div>
    ${c&&!c.safe?`<div style="font-size:13.5px;margin:4px 0"><span style="color:${GREEN}">The safe move:</span> ${esc(safeOpt.text)}</div>`:''}
    <div style="display:inline-flex;align-items:center;gap:6px;font-size:12px;background:#f4f3ee;border:1.5px solid #1a1a1a;border-radius:14px 4px 14px 4px;padding:3px 11px;margin-top:6px"><span style="color:${GREEN}">&#9745;</span>${esc(habit)}</div>
    <div style="font-size:11px;color:#777;margin-top:8px"><b>${esc(src.topic)}</b> &mdash; <span style="color:#999">${srcLink(src)}</span></div>
  </div>`;
}

function friday(v){
  const safeN=v.spokes.filter(s=>s.color===GREEN).length;
  const badN=v.spokes.filter(s=>s.color===RED).length;
  const best=v.best;
  const spokeLines=v.spokes.map(sp=>`<line x1="0" y1="0" x2="${sp.nx}" y2="${sp.ny}" stroke="${sp.color}" stroke-width="3.4" stroke-dasharray="260" style="animation:drawSpoke .6s ease both;animation-delay:${sp.delay}s"/>`).join('');
  const sel=(state.reviewOpen==null?0:state.reviewOpen);
  const spokeNodes=v.spokes.map(sp=>{ const isSel=(sp.n-1===sel); return `<g data-review="${sp.n-1}" style="cursor:pointer;animation:popIn .35s ease both;animation-delay:${sp.ndelay}s">
      <circle cx="${sp.x}" cy="${sp.y}" r="${isSel?24:21}" fill="${sp.color}" opacity="${isSel?0.2:0.1}"/>
      <circle cx="${sp.x}" cy="${sp.y}" r="16.5" fill="#fff" stroke="${sp.color}" stroke-width="${isSel?4.5:3.2}"/>
      <text x="${sp.x}" y="${sp.ty}" text-anchor="middle" font-family="Patrick Hand,cursive" font-size="16" stroke="none" fill="${sp.color}">${sp.n}</text>
    </g>`; }).join('');
  const legend=v.spokes.map(sp=>`<div style="display:flex;gap:9px;align-items:baseline;font-size:12.5px;line-height:1.35">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;border:2px solid ${sp.color};color:${sp.color};font-size:10px;font-weight:700;flex:none">${sp.n}</span>
      <span style="color:#666;min-width:34px">${esc(sp.day)}</span>
      <span style="color:${sp.color}">${esc(sp.cap)}</span>
    </div>`).join('');
  const habits=HABITS.map(h=>`<div style="display:flex;gap:10px;align-items:flex-start;padding:5px 0;font-size:13.5px;line-height:1.4"><span style="font-family:'Patrick Hand',cursive;font-size:18px">&#9745;</span><span>${esc(h)}</span></div>`).join('');
  return `<div style="animation:fadeUp .4s ease both">
    <div style="font-family:'Patrick Hand',cursive;font-size:15px;color:#c0392b;letter-spacing:1px;text-transform:uppercase;text-align:center">The Review</div>
    <h2 style="font-family:'Patrick Hand',cursive;font-size:40px;margin:2px 0 4px;font-weight:400;text-align:center">${esc(DATASET.reviewTitle)}</h2>
    <p style="text-align:center;font-size:13px;color:#555;margin:0 0 6px">Ten decisions. Two colours. No hiding.</p>
    <div style="display:flex;justify-content:center;gap:18px;font-size:12px;margin-bottom:2px">
      <span style="color:${GREEN}">&#9679; ${safeN} handled well</span>
      <span style="color:${RED}">&#9679; ${badN} went poorly</span>
    </div>
    <div style="text-align:center;font-size:12px;color:#555;margin-bottom:6px">Clean run: <b>${safeN}/10</b>${best!=null?` &middot; your best: <b>${best}/10</b>`:''}</div>
    <div style="display:flex;justify-content:center">
      <svg viewBox="-172 -172 344 344" width="100%" style="max-width:420px" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="0" cy="0" r="140" fill="none" stroke="#e0ded4" stroke-width="1.4" stroke-dasharray="2 8"/>
        <circle cx="0" cy="0" r="90" fill="none" stroke="#e0ded4" stroke-width="1.2" stroke-dasharray="2 8"/>
        ${spokeLines}
        <circle cx="0" cy="0" r="34" fill="#fff" stroke="#1a1a1a" stroke-width="2.4"/>
        <g filter="url(#rough)" stroke="#1a1a1a" stroke-width="2.2" transform="translate(0,4) scale(0.62)">
          <path d="M-10 -20 q-6 6 -3 13 q4 8 13 8 q9 0 11 -9 q1 -10 -8 -13 q-8 -3 -13 1z"/>
          <path d="M0 -1 q-2 15 0 29"/>
          <path d="M0 28 q-7 12 -11 24"/><path d="M0 28 q7 12 11 24"/>

// ---- shareable report card (canvas -> PNG) ----
function drawWheel(ctx,spokes,cx,cy,sc){
  spokes.forEach(sp=>{ ctx.strokeStyle=sp.color; ctx.lineWidth=4; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+sp.nx*sc, cy+sp.ny*sc); ctx.stroke(); });
  ctx.fillStyle='#fff'; ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cx,cy,26*sc,0,7); ctx.fill(); ctx.stroke();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  spokes.forEach(sp=>{ const x=cx+sp.x*sc, y=cy+sp.y*sc; ctx.fillStyle='#fff'; ctx.strokeStyle=sp.color; ctx.lineWidth=3.5; ctx.beginPath(); ctx.arc(x,y,16*sc,0,7); ctx.fill(); ctx.stroke(); ctx.fillStyle=sp.color; ctx.font='700 '+Math.round(17*sc)+'px "Patrick Hand", cursive'; ctx.fillText(String(sp.n), x, y+1); });
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}
function paintCard(v){
  const W=1200,H=630;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#f4f3ee'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#e6e4da'; for(let x=26;x<W;x+=28)for(let y=26;y<H;y+=28){ ctx.beginPath(); ctx.arc(x,y,1.3,0,7); ctx.fill(); }
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=4; ctx.strokeRect(18,18,W-36,H-36);
  ctx.fillStyle='#777'; ctx.font='16px "Courier Prime", monospace'; ctx.fillText(DATASET.kicker.toUpperCase(), 56, 70);
  ctx.fillStyle='#1a1a1a'; ctx.font='56px "Patrick Hand", cursive'; ctx.fillText(DATASET.brandName, 52, 128);
  ctx.font='118px "Patrick Hand", cursive'; ctx.fillStyle='#1a1a1a'; ctx.fillText(v.cleanCount+'/10', 56, 300);
  ctx.font='22px "Courier Prime", monospace'; ctx.fillStyle='#555'; ctx.fillText('decisions kept clean', 60, 336);
  ctx.font='64px "Patrick Hand", cursive'; ctx.fillStyle='#c0392b'; ctx.fillText(v.leakPct+'%', 56, 430);
  ctx.font='20px "Courier Prime", monospace'; ctx.fillStyle='#555'; ctx.fillText(DATASET.cardLeak, 60, 462);
  drawWheel(ctx, v.spokes, 930, 300, 0.92);
  const hook = v.cleanCount>=9 ? 'Nearly flawless — think you can match it? →'
                               : 'I let '+v.leakPct+'% of '+DATASET.cardSubject+' walk out. Beat me →';
  ctx.font='30px "Patrick Hand", cursive'; ctx.fillStyle='#1a1a1a'; ctx.fillText(hook, 56, 548);
  ctx.font='18px "Courier Prime", monospace'; ctx.fillStyle='#777';
  let url=''; try{ url=location.origin+(location.pathname||'/'); }catch(e){ url=''; }
  if(url) ctx.fillText(url.replace(/^https?:\/\//,''), 56, 586);
  return cv;
}
function downloadReportCard(){
  const go=()=>{
    const v=computeVals();
    const cv=paintCard(v);
    cv.toBlob(b=>{ if(!b) return; const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=DATASET.slug+'-report-card.png'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1500); }, 'image/png');

}

// ---- sleek canvas polish ----
function reducedMotion(){ try{ return matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){ return false; } }
function launchConfetti(n){
  if(reducedMotion()) return;
  const cv=document.createElement('canvas'); cv.setAttribute('data-noprint','');
  cv.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:60';
  const dpr=Math.min(2,window.devicePixelRatio||1);
  cv.width=innerWidth*dpr; cv.height=innerHeight*dpr;
  document.body.appendChild(cv);
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  const cols=['#1a1a1a','#c0392b','#2f7d32','#8ecae6','#e07a5f','#f2c94c'];
  const N=n||90, P=[];
  for(let i=0;i<N;i++) P.push({x:innerWidth*(0.15+0.7*Math.random()), y:-20-Math.random()*160, vx:(Math.random()-0.5)*3.2, vy:2+Math.random()*3, r:4+Math.random()*6, rot:Math.random()*6, vr:(Math.random()-0.5)*0.35, col:cols[i%cols.length], sq:Math.random()<0.6, life:1});
  const startT=performance.now(); let last=startT;
  function frame(t){
    const dt=Math.min(42,t-last); last=t; ctx.clearRect(0,0,innerWidth,innerHeight); let alive=0;
    P.forEach(p=>{ p.vy+=0.05*(dt/16); p.x+=p.vx*(dt/16); p.y+=p.vy*(dt/16); p.rot+=p.vr*(dt/16); if(p.y>innerHeight-40) p.life-=0.02*(dt/16);
      if(p.life>0){ alive++; ctx.save(); ctx.globalAlpha=Math.max(0,p.life); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.col;
        if(p.sq) ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.62); else { ctx.beginPath(); ctx.arc(0,0,p.r/2,0,7); ctx.fill(); }
        ctx.restore(); } });
    if(alive>0 && t-startT<5000) requestAnimationFrame(frame); else cv.remove();
  }
  requestAnimationFrame(frame);
}
function countUp(el,to,dur){
  if(!el) return; if(reducedMotion()){ el.textContent=to; return; }
  const t0=performance.now();
  (function step(t){ const k=Math.min(1,(t-t0)/dur); el.textContent=Math.round(to*(1-Math.pow(1-k,3))); if(k<1) requestAnimationFrame(step); })(performance.now());
}

// ---- sound effects (synthesized, self-contained) ----
const Sfx=(function(){
  let AC=null, muted=false;
  try{ muted = localStorage.getItem('byc_muted')==='1'; }catch(e){}
  function ctx(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } } if(AC&&AC.state==='suspended'){ try{AC.resume();}catch(e){} } return AC; }
  function tone(f,t0,dur,type,vol){ const c=ctx(); if(!c) return; const o=c.createOscillator(), g=c.createGain(); o.type=type||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); const s=c.currentTime+t0; g.gain.setValueAtTime(0.0001,s); g.gain.exponentialRampToValueAtTime(vol,s+0.01); g.gain.exponentialRampToValueAtTime(0.0001,s+dur); o.start(s); o.stop(s+dur+0.02); }
  const K={
    click:()=>tone(680,0,0.05,'triangle',0.05),
    select:()=>{tone(540,0,0.06,'triangle',0.05);tone(760,0.05,0.07,'triangle',0.045);},
    good:()=>{tone(660,0,0.09,'sine',0.06);tone(990,0.075,0.12,'sine',0.05);},
    bad:()=>{tone(210,0,0.14,'sawtooth',0.045);tone(150,0.09,0.16,'sawtooth',0.038);},
    success:()=>{[523,659,784,1047].forEach((f,i)=>tone(f,i*0.085,0.30,'sine',0.05));},
    toggle:()=>tone(520,0,0.05,'square',0.05)
  };
  return { play(k){ if(muted) return; try{(K[k]||K.click)();}catch(e){} }, toggle(){ muted=!muted; try{localStorage.setItem('byc_muted',muted?'1':'0');}catch(e){} if(!muted) K.toggle(); return muted; }, isMuted(){ return muted; } };
})();
function mountMute(){

function render(){
  const v=computeVals();
  let html='';
  if(v.showChrome) html+=chrome(v);
  switch(state.screen){
    case 'landing': html+=landing(); break;
    case 'about': html+=about(); break;
    case 'day': html+=dayScreen(v); break;
    case 'consequence': html+=consequence(v); break;
    case 'friday': html+=friday(v); break;
    case 'incident': html+=incident(v); break;
    case 'cert': html+=cert(v); break;
    case 'facilitator': html+=facilitator(); break;
  }
  const app=document.getElementById('app');
  app.innerHTML=html;
  const changed = state.screen!==state._prevScreen;
  if(changed){ window.scrollTo(0,0); state._prevScreen=state.screen; }
  if(changed && state.screen==='cert'){ launchConfetti(70 + v.cleanCount*9); Sfx.play('success'); }
  if(changed){ const ln=document.getElementById('leakNum'); if(ln) countUp(ln, Number(ln.dataset.to), 1100);
               const cs=document.getElementById('certScore'); if(cs) countUp(cs, Number(cs.dataset.to), 900); }

  app.querySelectorAll('[data-rot]').forEach(el=>{
    const rot=el.getAttribute('data-rot');
    el.addEventListener('mouseenter',()=>{ el.style.transform=`translateY(-2px) rotate(${rot}deg)`; });
    el.addEventListener('mouseleave',()=>{ el.style.transform=''; });
    el.addEventListener('mousedown',()=>{ el.style.transform='translateY(1px)'; });
  });
  app.querySelectorAll('[data-choose]').forEach(el=>{
    el.addEventListener('click',()=>{ const [dy,idx]=el.getAttribute('data-choose').split(':').map(Number); Sfx.play(DAYS[dy].opts[idx].safe?'good':'bad'); choose(dy,idx); });
  });
  app.querySelectorAll('[data-review]').forEach(el=>{
    el.addEventListener('click',()=>{ Sfx.play('select'); state.reviewOpen=Number(el.getAttribute('data-review')); render(); });
  });
  app.querySelectorAll('[data-act]').forEach(el=>{
    el.addEventListener('click',()=>{
      Sfx.play(el.getAttribute('data-act')==='cite'?'select':'click');
      switch(el.getAttribute('data-act')){
        case 'start': state.facilitator=false; start(); break;
        case 'about': state.screen='about'; render(); break;
        case 'landing': state.screen='landing'; render(); break;
        case 'continue': continueDay(); break;
        case 'end': gotoEnd(); break;
        case 'cert': state.screen='cert'; render(); break;
        case 'cite': state.citeOpen=!state.citeOpen; render(); break;
        case 'print': window.print(); break;
        case 'restart': restart(); break;
        case 'replay': start(); break;
        case 'facilitator': state.screen='facilitator'; render(); break;
        case 'card': downloadReportCard(); break;
      }
    });
  });
  const ni=document.getElementById('nameInput');
  if(ni) ni.addEventListener('input',e=>{ state.name=e.target.value; const pn=document.getElementById('printName'); if(pn) pn.textContent=e.target.value; });
}

render();
mountMute();
mountCursor();
</script>
</body>
</html>
